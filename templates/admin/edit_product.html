{% extends "admin/base.html" %}

{% block content %}

<h1 class="page-title">
    ✏️ Редактирование товара
</h1>

<div class="card">

<form
    action="/admin/products/{{ product.id }}/edit"
    method="post"
>

<div class="form-group">

<label>
Название
</label>

<input
    type="text"
    name="name"
    value="{{ product.name }}"
>

</div>

<div class="form-group">

<label>
Описание
</label>

<textarea
    name="description"
    rows="6"
>{{ product.description }}</textarea>

</div>

<div class="form-group">

<label>
Цена
</label>

<input
    type="number"
    name="price"
    value="{{ product.price }}"
>

</div>

<div class="form-group">

<label>
Категория
</label>

<input
    type="text"
    name="category"
    value="{{ product.category }}"
>

</div>

<div class="form-group">

<label>
Остаток
</label>

<input
    type="number"
    name="stock"
    value="{{ product.stock }}"
>

</div>

<div class="spec-card">

    <div class="spec-header">

        <h3>
            Характеристики товара
        </h3>

        <button
            type="button"
            class="add-spec-btn"
            onclick="addSpec()"
        >
            + Добавить
        </button>

    </div>

    <div id="specifications">

        {% if product.specifications %}

            {% for key, value in product.specifications.items() %}

            <div class="spec-item">

                <div class="drag">
                    ☰
                </div>

                <input
                    type="text"
                    name="spec_key"
                    value="{{ key }}"
                    placeholder="Название"
                >

                <input
                    type="text"
                    name="spec_value"
                    value="{{ value }}"
                    placeholder="Значение"
                >

                <button
                    type="button"
                    class="delete-spec"
                    onclick="removeSpec(this)"
                >
                    ✕
                </button>

            </div>

            {% endfor %}

        {% endif %}

    </div>

</div>

<button
    class="btn btn-green"
>
    Сохранить изменения
</button>

</form>

</div>

<script>

function addSpec() {

    document
        .getElementById("specifications")
        .insertAdjacentHTML(
            "beforeend",

`
<div class="spec-item">

    <div class="drag">
        ☰
    </div>

    <input
        type="text"
        name="spec_key"
        placeholder="Название"
    >

    <input
        type="text"
        name="spec_value"
        placeholder="Значение"
    >

    <button
        type="button"
        class="delete-spec"
        onclick="removeSpec(this)"
    >
        ✕
    </button>

</div>
`
    );
}

function removeSpec(button) {
    button.closest(".spec-item").remove();
}

</script>

{% endblock %}

<style>

.spec-card{

    margin-top:30px;

    background:#1B1E22;

    border-radius:20px;

    padding:20px;

    border:1px solid #2c3138;
}

.spec-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:20px;
}

.spec-header h3{

    margin:0;

    color:white;
}

.add-spec-btn{

    background:#D4A056;

    color:black;

    border:none;

    border-radius:10px;

    padding:10px 18px;

    cursor:pointer;

    font-weight:bold;
}

.add-spec-btn:hover{

    opacity:.9;
}

.spec-item{

    display:grid;

    grid-template-columns:
        40px
        1fr
        1fr
        50px;

    gap:12px;

    align-items:center;

    margin-bottom:12px;
}

.drag{

    text-align:center;

    font-size:22px;

    color:#777;

    cursor:grab;
}

.spec-item input{

    background:#111315;

    border:1px solid #2e3238;

    border-radius:10px;

    color:white;

    padding:12px;
}

.spec-item input:focus{

    outline:none;

    border-color:#D4A056;
}

.delete-spec{

    background:#ff4d4d;

    border:none;

    color:white;

    border-radius:10px;

    height:45px;

    cursor:pointer;

    font-size:18px;
}

.delete-spec:hover{

    background:#ff2e2e;
}

</style>
