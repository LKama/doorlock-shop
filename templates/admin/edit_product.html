{% extends "admin/base.html" %}

{% block content %}

<h1 class="page-title">
    ✏️ Редактирование товара
</h1>

<div class="card">

<form
    action="/admin/products/{{ product.id }}/edit"
    method="post"
>

<div class="form-group">

<label>
Название
</label>

<input
    type="text"
    name="name"
    value="{{ product.name }}"
>

</div>

<div class="form-group">

<label>
Описание
</label>

<textarea
    name="description"
    rows="6"
>{{ product.description }}</textarea>

</div>

<div class="form-group">

<label>
Цена
</label>

<input
    type="number"
    name="price"
    value="{{ product.price }}"
>

</div>

<div class="form-group">

<label>
Категория
</label>

<input
    type="text"
    name="category"
    value="{{ product.category }}"
>

</div>

<div class="form-group">

<label>
Остаток
</label>

<input
    type="number"
    name="stock"
    value="{{ product.stock }}"
>

</div>

<h3 style="margin-top:30px">
    Характеристики
</h3>

<div id="specifications">

{% if product.specifications %}

    {% for key, value in product.specifications.items() %}

    <div class="spec-row">

        <input
            type="text"
            name="spec_key"
            value="{{ key }}"
            placeholder="Название"
        >

        <input
            type="text"
            name="spec_value"
            value="{{ value }}"
            placeholder="Значение"
        >

        <button
            type="button"
            class="remove-btn"
            onclick="removeSpec(this)"
        >
            ✕
        </button>

    </div>

    {% endfor %}

{% endif %}

</div>

<button
    type="button"
    class="btn btn-blue"
    onclick="addSpec()"
>
    + Добавить характеристику
</button>

<br><br>

<button
    class="btn btn-green"
>
    Сохранить изменения
</button>

</form>

</div>

<script>

function addSpec() {

    const container =
        document.getElementById(
            "specifications"
        );

    container.insertAdjacentHTML(
        "beforeend",
        `
        <div class="spec-row">

            <input
                type="text"
                name="spec_key"
                placeholder="Название"
            >

            <input
                type="text"
                name="spec_value"
                placeholder="Значение"
            >

            <button
                type="button"
                class="remove-btn"
                onclick="removeSpec(this)"
            >
                ✕
            </button>

        </div>
        `
    );
}

function removeSpec(btn) {
    btn.parentElement.remove();
}

</script>
{% endblock %}

<style>

.spec-row{
    display:flex;
    gap:10px;
    margin-bottom:10px;
}

.spec-row input{
    flex:1;
}

.remove-btn{
    background:#ff4444;
    border:none;
    color:white;
    width:40px;
    border-radius:8px;
    cursor:pointer;
}

</style>
