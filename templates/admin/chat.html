{% extends "admin/base.html" %}

{% block content %}

<div class="chat-wrapper">

    <div class="chat-header">

        <div class="avatar">
            {{ user.name[0].upper() }}
        </div>

        <div>

            <div class="name">
                {{ user.name }}
            </div>

            <div class="email">
                {{ user.email }}
            </div>

        </div>

    </div>

    <div class="messages">

        {% for msg in messages %}

            <div class="
                bubble
                {% if msg.sender == 'admin' %}
                admin
                {% else %}
                user
                {% endif %}
            ">

                {{ msg.message }}

            </div>

        {% endfor %}

    </div>

    <form
        method="post"
        action="/admin/chat/{{ user.id }}/send"
        class="send-form"
    >

        <input
            name="message"
            placeholder="Введите сообщение..."
            required
        >

        <button>
            Отправить
        </button>

    </form>

</div>

<style>

.chat-wrapper{
    display:flex;
    flex-direction:column;
    height:80vh;
}

.chat-header{
    background:#1B1E22;
    border-radius:20px;
    padding:20px;
    display:flex;
    align-items:center;
    gap:15px;
}

.avatar{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#D4A056;
    color:black;
    font-size:22px;
    font-weight:bold;

    display:flex;
    align-items:center;
    justify-content:center;
}

.name{
    font-size:20px;
    font-weight:bold;
}

.email{
    color:#888;
}

.messages{
    flex:1;
    overflow-y:auto;

    display:flex;
    flex-direction:column;

    gap:12px;

    padding:20px 0;
}

.bubble{
    max-width:70%;
    padding:12px 16px;
    border-radius:16px;
    word-break:break-word;
}

.user{
    align-self:flex-start;
    background:#1B1E22;
}

.admin{
    align-self:flex-end;
    background:#D4A056;
    color:black;
    font-weight:bold;
}

.send-form{
    display:flex;
    gap:10px;
}

.send-form input{
    flex:1;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#1B1E22;
    color:white;
}

.send-form button{
    border:none;
    border-radius:12px;
    background:#D4A056;
    color:black;
    font-weight:bold;
    padding:0 24px;
    cursor:pointer;
}

</style>

{% endblock %}
