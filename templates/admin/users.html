{% extends "admin/base.html" %}

{% block content %}

<h1 class="page-title">
    👥 Пользователи
</h1>

<div class="card">

<table class="table">

<tr>
<th>ID</th>
<th>Имя</th>
<th>Email</th>
<th>Дата регистрации</th>
</tr>

{% for user in users %}

<tr>

<td>
{{ user.id }}
</td>

<td>
{{ user.name }}
</td>

<td>
{{ user.email }}
</td>

<td>
{{ user.created_at }}
</td>

<td>
    <a href="/admin/chat/{{ user.id }}"
       class="btn btn-primary">
        Чат
    </a>
</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
