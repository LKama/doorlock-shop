{% extends "admin/base.html" %}

{% block content %}

<h1 class="page-title">
    Пользователи
</h1>

<div class="users-grid">

    {% for user in users %}

    <a href="/admin/chat/{{ user.id }}" class="user-card">

        <div class="avatar">
            {{ user.name[0].upper() }}
        </div>

        <div class="info">

            <div class="name">
                {{ user.name }}
            </div>

            <div class="email">
                {{ user.email }}
            </div>

        </div>

        <div class="arrow">
            →
        </div>

    </a>

    {% endfor %}

</div>

<style>

.users-grid{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.user-card{
    background:#1B1E22;
    border-radius:16px;
    padding:16px;
    display:flex;
    align-items:center;
    gap:16px;
    text-decoration:none;
    color:white;
    transition:.2s;
}

.user-card:hover{
    transform:translateY(-2px);
    background:#23272d;
}

.avatar{
    width:55px;
    height:55px;
    border-radius:50%;
    background:#D4A056;
    color:black;
    font-size:22px;
    font-weight:bold;

    display:flex;
    align-items:center;
    justify-content:center;
}

.info{
    flex:1;
}

.name{
    font-size:18px;
    font-weight:bold;
}

.email{
    color:#888;
    margin-top:4px;
}

.arrow{
    font-size:24px;
    color:#D4A056;
}

</style>

{% endblock %}
