<!DOCTYPE html>
<html>
<head>
<title>Пользователи</title>
<link rel="stylesheet"
href="/static/css/admin.css">
</head>

<body>

<div class="container">

<h1>👤 Пользователи</h1>

<table>

<tr>
<th>ID</th>
<th>Имя</th>
<th>Email</th>
</tr>

{% for user in users %}

<tr>

<td>{{ user.id }}</td>

<td>{{ user.name }}</td>

<td>{{ user.email }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
