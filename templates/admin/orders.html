{% extends "admin/base.html" %}

{% block content %}

<h1 class="page-title">
    🛒 Заказы
</h1>

<div class="card">

<table class="table">

<tr>
<th>ID</th>
<th>Сумма</th>
<th>Телефон</th>
<th>Статус</th>
<th>Изменить</th>
</tr>

{% for order in orders %}

<tr>

<td>
#{{ order.id }}
</td>

<td>
{{ order.total_price }} ₽
</td>

<td>
{{ order.phone }}
</td>

<td>

<span class="status {{ order.status }}">
{{ order.status }}
</span>

</td>

<td>

<form
action="/admin/orders/{{ order.id }}/status"
method="post"
class="status-form"
>

<select
name="status"
class="status-select"
>

<option value="pending"
{% if order.status == "pending" %}selected{% endif %}>
🟡 Новый
</option>

<option value="processing"
{% if order.status == "processing" %}selected{% endif %}>
🔵 В обработке
</option>

<option value="shipped"
{% if order.status == "shipped" %}selected{% endif %}>
🟣 Отправлен
</option>

<option value="delivered"
{% if order.status == "delivered" %}selected{% endif %}>
🟢 Доставлен
</option>

<option value="cancelled"
{% if order.status == "cancelled" %}selected{% endif %}>
🔴 Отменён
</option>

</select>

<button class="btn btn-gold">
💾
</button>

</form>

</td>

</tr>

{% endfor %}

</table>

</div>

{% endblock %}
